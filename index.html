<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>筋トレ育成ゲーム</title>
<style>
  :root {
    --skin: #c9895e;
    --skin-dark: #8a5636;
    --pants: #c0392b;
    --pants-dark: #8e2a1f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, #1a1c2c 0%, #2d2f45 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    color: #f0f0f5;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .app {
    width: 100%;
    max-width: 720px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .header .title { font-size: 15px; font-weight: 700; color: #ffd166; }
  .header .sub { font-size: 12px; color: #a9abc0; margin-top: 2px; }
  .reset-btn {
    background: transparent;
    border: 1px solid #4a4d6a;
    color: #cfd1e6;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .reset-btn:hover { background: #3a3d58; }
  .main {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .char-card {
    flex: 0 0 240px;
    position: relative;
    background: #23253a;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  #bubble {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%) scale(0.85);
    opacity: 0;
    background: #ffffff;
    color: #23253a;
    border-radius: 14px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    transition: opacity .2s, transform .2s;
    z-index: 2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  #bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 6px solid #ffffff;
  }
  .panel-side { flex: 1; min-width: 280px; }
  .parts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .part-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    padding: 8px 10px;
    background: #23253a;
    border: 2px solid transparent;
    border-radius: 10px;
    color: #f0f0f5;
    cursor: pointer;
    text-align: left;
  }
  .part-btn:hover { background: #2c2f48; }
  .part-btn.selected { border-color: #ffd166; }
  .part-btn .label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; }
  .part-btn .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .part-btn .cnt { font-size: 11px; color: #a9abc0; }
  .train-card {
    background: #23253a;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .sel-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .sel-row .name { font-size: 16px; font-weight: 700; }
  .sel-row .count { font-size: 22px; font-weight: 800; color: #ffd166; }
  #trainBtn {
    width: 100%;
    height: 48px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: #ffd166;
    color: #23253a;
    cursor: pointer;
    position: relative;
    overflow: visible;
    transition: transform .08s;
  }
  #trainBtn:active { transform: scale(0.97); }
  .energy-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }
  .bar-track {
    flex: 1;
    height: 9px;
    border-radius: 5px;
    background: #14152180;
    overflow: hidden;
  }
  #energyFill { height: 100%; width: 100%; background: #6bcB77; transition: width .2s; }
  .energy-text { font-size: 12px; color: #a9abc0; min-width: 50px; text-align: right; }
  #restBtn {
    width: 100%;
    height: 36px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #4a4d6a;
    background: transparent;
    color: #cfd1e6;
    cursor: pointer;
  }
  #restBtn:hover { background: #2c2f48; }
  #doneBtn {
    width: 100%;
    height: 38px;
    font-size: 13px;
    font-weight: 700;
    margin-top: 18px;
    border-radius: 10px;
    border: 1px solid #ffd166;
    background: transparent;
    color: #ffd166;
    cursor: pointer;
  }
  #doneBtn:hover { background: rgba(255,209,102,0.12); }
  .ending-screen { display: none; text-align: center; padding: 32px 16px 8px; }
  .ending-emoji { font-size: 60px; margin-bottom: 8px; }
  .ending-title { font-size: 21px; font-weight: 800; color: #ffd166; margin-bottom: 10px; }
  .ending-desc { font-size: 14px; color: #cfd1e6; max-width: 440px; margin: 0 auto 24px; line-height: 1.75; }
  .ending-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 8px;
    max-width: 480px;
    margin: 0 auto 28px;
  }
  .ending-stat {
    background: #23253a;
    border-radius: 10px;
    padding: 8px 10px;
    text-align: left;
  }
  .ending-stat .k { font-size: 11px; color: #a9abc0; }
  .ending-stat .v { font-size: 15px; font-weight: 700; color: #f0f0f5; }
  .ending-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
  .ending-actions button {
    height: 40px;
    padding: 0 18px;
    font-size: 13px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
  }
  #continueBtn { border: none; background: #ffd166; color: #23253a; }
  #restartBtn { border: 1px solid #4a4d6a; background: transparent; color: #cfd1e6; }
  #restartBtn:hover { background: #2c2f48; }
  @keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -28px); }
  }
  .popup {
    position: absolute;
    left: 50%; top: -4px;
    transform: translate(-50%, 0);
    font-size: 13px;
    font-weight: 700;
    color: #ffd166;
    pointer-events: none;
    animation: floatUp .7s ease-out forwards;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header" id="gameHeader">
    <div>
      <div class="title" id="titleLabel">筋トレビギナー</div>
      <div class="sub">合計トレーニング回数 <span id="totalCount">0</span>回</div>
    </div>
    <button class="reset-btn" id="resetBtn">最初から</button>
  </div>

  <div class="main" id="gameMain">
    <div class="char-card">
      <div id="bubble"></div>
      <svg id="charSvg" viewBox="0 0 240 340" style="width:100%; max-width:220px; overflow:visible;">
        <ellipse id="p-back_l" cx="62" cy="118" rx="9" ry="46" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:center; transition:transform .25s;"></ellipse>
        <ellipse id="p-back_r" cx="178" cy="118" rx="9" ry="46" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:center; transition:transform .25s;"></ellipse>

        <ellipse id="p-legs_l" cx="104" cy="228" rx="16" ry="55" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:top; transition:transform .25s;"></ellipse>
        <ellipse id="p-legs_r" cx="136" cy="228" rx="16" ry="55" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:top; transition:transform .25s;"></ellipse>

        <rect id="p-chest" x="88" y="94" width="64" height="48" rx="14" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:center; transition:transform .25s;"></rect>

        <g id="p-abs" style="transform-box:fill-box; transform-origin:top; transition:transform .25s;">
          <rect x="96" y="140" width="48" height="44" rx="8" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2"></rect>
          <line x1="120" y1="140" x2="120" y2="184" stroke="var(--skin-dark)" stroke-width="1.5"></line>
          <line x1="96" y1="155" x2="144" y2="155" stroke="var(--skin-dark)" stroke-width="1.5"></line>
          <line x1="96" y1="170" x2="144" y2="170" stroke="var(--skin-dark)" stroke-width="1.5"></line>
        </g>

        <path d="M 90 178 L 150 178 L 150 188 Q 120 198 90 188 Z" fill="var(--pants)" stroke="var(--pants-dark)" stroke-width="1.5"></path>
        <path d="M 96 186 L 144 186 L 128 212 L 112 212 Z" fill="var(--pants)" stroke="var(--pants-dark)" stroke-width="1.5"></path>

        <ellipse id="p-shoulders_l" cx="80" cy="98" rx="15" ry="13" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:center; transition:transform .25s;"></ellipse>
        <ellipse id="p-shoulders_r" cx="160" cy="98" rx="15" ry="13" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:center; transition:transform .25s;"></ellipse>

        <ellipse id="p-arms_l" cx="68" cy="132" rx="11" ry="33" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:top; transition:transform .25s;"></ellipse>
        <ellipse id="p-arms_r" cx="172" cy="132" rx="11" ry="33" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2" style="transform-box:fill-box; transform-origin:top; transition:transform .25s;"></ellipse>

        <rect x="110" y="76" width="20" height="16" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2"></rect>
        <circle cx="120" cy="54" r="26" fill="var(--skin)" stroke="var(--skin-dark)" stroke-width="2"></circle>

        <rect x="104" y="45" width="13" height="4" rx="2" fill="#4a2f1c" transform="rotate(-8 110.5 47)"></rect>
        <rect x="123" y="45" width="13" height="4" rx="2" fill="#4a2f1c" transform="rotate(8 129.5 47)"></rect>
        <ellipse cx="112" cy="55" rx="2.6" ry="3.4" fill="#2b2018"></ellipse>
        <ellipse cx="128" cy="55" rx="2.6" ry="3.4" fill="#2b2018"></ellipse>
        <line x1="109" y1="66" x2="131" y2="66" stroke="#4a2f1c" stroke-width="2" stroke-linecap="round"></line>
      </svg>
    </div>

    <div class="panel-side">
      <div class="parts-grid" id="partsGrid"></div>

      <div class="train-card">
        <div class="sel-row">
          <span class="name" id="selName"></span>
          <span class="count" id="selCount"></span>
        </div>

        <button id="trainBtn">トレーニングする</button>

        <div class="energy-row">
          <span style="font-size:16px;">⚡</span>
          <div class="bar-track"><div id="energyFill"></div></div>
          <span class="energy-text" id="energyText">100/100</span>
        </div>
        <button id="restBtn">休憩する（エネルギー全回復）</button>
        <button id="doneBtn">完了する</button>
      </div>
    </div>
  </div>

  <div class="ending-screen" id="endingScreen">
    <div class="ending-emoji" id="endingEmoji"></div>
    <div class="ending-title" id="endingTitle"></div>
    <div class="ending-desc" id="endingDesc"></div>
    <div class="ending-stats" id="endingStats"></div>
    <div class="ending-actions">
      <button id="continueBtn">続きから鍛える</button>
      <button id="restartBtn">最初からやり直す</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'muscle-training-game-save';
const HIGHLIGHT = '#ffd166';
const DEFAULT_STROKE = '#8a5636';

const parts = {
  arms_l:      { name: '左腕 (二頭筋)',     color: '#ff6b6b', svg: ['p-arms_l'] },
  arms_r:      { name: '右腕 (二頭筋)',     color: '#ff6b6b', svg: ['p-arms_r'] },
  chest:       { name: '胸 (大胸筋)',       color: '#4ecdc4', svg: ['p-chest'] },
  shoulders_l: { name: '左肩 (三角筋)',     color: '#ffd166', svg: ['p-shoulders_l'] },
  shoulders_r: { name: '右肩 (三角筋)',     color: '#ffd166', svg: ['p-shoulders_r'] },
  back_l:      { name: '左背中 (広背筋)',   color: '#a78bfa', svg: ['p-back_l'] },
  back_r:      { name: '右背中 (広背筋)',   color: '#a78bfa', svg: ['p-back_r'] },
  legs_l:      { name: '左脚 (大腿四頭筋)', color: '#4d96ff', svg: ['p-legs_l'] },
  legs_r:      { name: '右脚 (大腿四頭筋)', color: '#4d96ff', svg: ['p-legs_r'] },
  abs:         { name: '腹筋',              color: '#ff6fa5', svg: ['p-abs'] }
};
const shortLabel = {
  arms_l: '左腕', arms_r: '右腕', chest: '胸', shoulders_l: '左肩', shoulders_r: '右肩',
  back_l: '左背中', back_r: '右背中', legs_l: '左脚', legs_r: '右脚', abs: '腹筋'
};

function loadSave() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

const saved = loadSave();
Object.keys(parts).forEach(k => {
  parts[k].count = (saved && saved.parts && typeof saved.parts[k] === 'number') ? saved.parts[k] : 0;
});

let selected = (saved && saved.selected && parts[saved.selected]) ? saved.selected : 'arms_l';
let energy = (saved && typeof saved.energy === 'number') ? saved.energy : 100;
const maxEnergy = 100;
const energyCost = 4;
let bubbleTimer = null;

const titles = [
  { min: 0,   label: '筋トレビギナー' },
  { min: 50,  label: '筋トレ愛好家' },
  { min: 150, label: 'マッスル戦士' },
  { min: 350, label: 'ボディビルダー' },
  { min: 700, label: '伝説の筋肉モンスター' }
];

const generalComments = [
  'いい感じ!', 'その調子!', 'パンプしてきた!', 'まだいける!', '限界突破!',
  '筋肉は裏切らない', '今日もナイスファイト!', '汗が気持ちいい!', 'もっと追い込め!', '休まずいくぞ!'
];

function saveGame() {
  const data = {
    parts: Object.fromEntries(Object.keys(parts).map(k => [k, parts[k].count])),
    selected,
    energy
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
}

const partsGrid = document.getElementById('partsGrid');
function renderGrid() {
  partsGrid.innerHTML = '';
  Object.keys(parts).forEach(key => {
    const p = parts[key];
    const btn = document.createElement('button');
    btn.className = 'part-btn' + (key === selected ? ' selected' : '');
    btn.innerHTML =
      '<span class="label"><span class="dot" style="background:' + p.color + '"></span>' + shortLabel[key] + '</span>' +
      '<span class="cnt">' + p.count + '回</span>';
    btn.onclick = () => { selected = key; renderGrid(); updateSelected(); saveGame(); };
    partsGrid.appendChild(btn);
  });
}

const selName = document.getElementById('selName');
const selCount = document.getElementById('selCount');
const energyFill = document.getElementById('energyFill');
const energyText = document.getElementById('energyText');
const titleLabel = document.getElementById('titleLabel');
const totalCountEl = document.getElementById('totalCount');
const trainBtn = document.getElementById('trainBtn');
const restBtn = document.getElementById('restBtn');
const resetBtn = document.getElementById('resetBtn');
const doneBtn = document.getElementById('doneBtn');
const bubble = document.getElementById('bubble');
const gameHeader = document.getElementById('gameHeader');
const gameMain = document.getElementById('gameMain');
const endingScreen = document.getElementById('endingScreen');
const endingEmoji = document.getElementById('endingEmoji');
const endingTitle = document.getElementById('endingTitle');
const endingDesc = document.getElementById('endingDesc');
const endingStats = document.getElementById('endingStats');
const continueBtn = document.getElementById('continueBtn');
const restartBtn = document.getElementById('restartBtn');

function updateSelected() {
  const p = parts[selected];
  selName.textContent = p.name;
  selCount.textContent = p.count + '回';
  applyHighlight();
}

function applyHighlight() {
  Object.keys(parts).forEach(key => {
    const isSelected = key === selected;
    parts[key].svg.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.stroke = isSelected ? HIGHLIGHT : DEFAULT_STROKE;
      el.style.strokeWidth = isSelected ? '4' : '2';
    });
  });
}

function updateEnergy() {
  energyFill.style.width = Math.round((energy / maxEnergy) * 100) + '%';
  energyText.textContent = Math.round(energy) + '/' + maxEnergy;
}

function updateBodyVisual(key) {
  const p = parts[key];
  const scale = Math.min(1 + p.count * 0.03, 3.4);
  p.svg.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.transform = 'scale(' + scale.toFixed(2) + ')';
  });
}

function computeTotalCount() {
  return Object.values(parts).reduce((s, p) => s + p.count, 0);
}

function updateTitle() {
  const total = computeTotalCount();
  totalCountEl.textContent = total;
  let current = titles[0].label;
  titles.forEach(t => { if (total >= t.min) current = t.label; });
  titleLabel.textContent = current;
}

function popupText(text) {
  const span = document.createElement('span');
  span.textContent = text;
  span.className = 'popup';
  trainBtn.appendChild(span);
  setTimeout(() => span.remove(), 700);
}

function showBubble(key) {
  const partComment = shortLabel[key] + 'が育ってきた!';
  const useGeneral = Math.random() < 0.6;
  const text = useGeneral ? generalComments[Math.floor(Math.random() * generalComments.length)] : partComment;
  bubble.textContent = text;
  bubble.style.opacity = '1';
  bubble.style.transform = 'translateX(-50%) scale(1)';
  if (bubbleTimer) clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => {
    bubble.style.opacity = '0';
    bubble.style.transform = 'translateX(-50%) scale(0.85)';
  }, 1800);
}

function train() {
  if (energy < energyCost) {
    popupText('エネルギー不足');
    return;
  }
  energy = Math.max(0, energy - energyCost);
  updateEnergy();

  const p = parts[selected];
  p.count += 1;

  const svgEl = document.getElementById(p.svg[0]);
  if (svgEl) {
    const base = Math.min(1 + p.count * 0.03, 3.4);
    svgEl.style.transform = 'scale(' + (base * 1.06).toFixed(2) + ')';
    setTimeout(() => { updateBodyVisual(selected); }, 120);
  }
  popupText('+1回');

  if (p.count % 5 === 0) {
    showBubble(selected);
  }

  renderGrid();
  updateSelected();
  updateTitle();
  saveGame();
}

function rest() {
  energy = maxEnergy;
  updateEnergy();
  saveGame();
}

let resetArmed = false;
let resetArmTimer = null;

function handleResetClick() {
  if (!resetArmed) {
    resetArmed = true;
    resetBtn.textContent = 'もう一度押すとリセットします';
    resetArmTimer = setTimeout(() => {
      resetArmed = false;
      resetBtn.textContent = '最初から';
    }, 3000);
    return;
  }
  clearTimeout(resetArmTimer);
  resetArmed = false;
  resetBtn.textContent = '最初から';
  resetGame();
}

function resetGame() {
  Object.keys(parts).forEach(k => {
    parts[k].count = 0;
    updateBodyVisual(k);
  });
  energy = 100;
  selected = 'arms_l';
  bubble.style.opacity = '0';
  renderGrid();
  updateSelected();
  updateEnergy();
  updateTitle();
  saveGame();
}

const dominantEndings = {
  arms: {
    emoji: '💪',
    title: '怪力ポパイエンド',
    desc: '腕だけが規格外に発達し、他の部位が追いついていない。握力だけで生きていける体になった。'
  },
  shoulders: {
    emoji: '📐',
    title: 'いかり肩星人エンド',
    desc: '肩幅だけが異常発達し、ドアを通るのに毎回体を斜めにする羽目になった。'
  },
  back: {
    emoji: '🌫️',
    title: '後ろ姿だけ番長エンド',
    desc: '振り返らなければただの人。だが背中だけは伝説と噂されている。'
  },
  legs: {
    emoji: '🏃',
    title: '下半身の帝王エンド',
    desc: '脚だけが化け物じみて成長し、走ると音速、だが上半身は置いてけぼり。'
  },
  chest: {
    emoji: '🛡️',
    title: '胸板番長エンド',
    desc: '胸だけが分厚い鎧のように育った。抱きしめられると痛いと言われる。'
  },
  abs: {
    emoji: '🧊',
    title: '細マッチョ求道者エンド',
    desc: '腹筋だけをひたすら鍛え続けた求道者。腹は割れたが腕は普通のままだった。'
  }
};

const asymFlavor = {
  arms: { emoji: '🦾', title: '隻腕の怪力エンド', unit: '腕' },
  shoulders: { emoji: '📐', title: '傾いた肩エンド', unit: '肩' },
  back: { emoji: '🌀', title: 'ねじれ番長エンド', unit: '背中' },
  legs: { emoji: '🦵', title: '千鳥足エンド', unit: '脚' }
};

function buildAsymEnding(a) {
  const f = asymFlavor[a.key];
  return {
    emoji: f.emoji,
    title: f.title,
    desc: f.unit + 'の' + a.bigger + '側だけが突出して発達してしまい、体のバランスが左右で全く違う。歩くたびに傾く。'
  };
}

function getEnding() {
  const total = Object.values(parts).reduce((s, p) => s + p.count, 0);

  if (total === 0) {
    return { emoji: '🛌', title: 'ただの一般人エンド', desc: '一度もトレーニングしないまま終わった。それもまた人生。' };
  }
  if (total < 20) {
    return { emoji: '🚶', title: '三日坊主エンド', desc: 'ジムに何度か通った程度で満足してしまったようだ。' };
  }

  const pairs = [
    { key: 'arms', l: parts.arms_l.count, r: parts.arms_r.count },
    { key: 'shoulders', l: parts.shoulders_l.count, r: parts.shoulders_r.count },
    { key: 'back', l: parts.back_l.count, r: parts.back_r.count },
    { key: 'legs', l: parts.legs_l.count, r: parts.legs_r.count }
  ];
  let asymCandidate = null;
  pairs.forEach(p => {
    const sum = p.l + p.r;
    if (sum >= 10) {
      const diff = Math.abs(p.l - p.r);
      const ratio = diff / sum;
      if (ratio >= 0.6 && diff >= 8 && (!asymCandidate || ratio > asymCandidate.ratio)) {
        asymCandidate = { key: p.key, diff, ratio, bigger: p.l > p.r ? '左' : '右' };
      }
    }
  });
  if (asymCandidate) return buildAsymEnding(asymCandidate);

  const allCounts = Object.keys(parts).map(k => parts[k].count);
  const maxC = Math.max(...allCounts);
  const minC = Math.min(...allCounts);
  if (total >= 30 && (maxC - minC) <= 2) {
    return { emoji: '✨', title: '完璧な黄金比エンド', desc: '全身が寸分たがわぬバランスで鍛え上げられた、奇跡のような肉体になった。' };
  }

  const groups = {
    arms: parts.arms_l.count + parts.arms_r.count,
    shoulders: parts.shoulders_l.count + parts.shoulders_r.count,
    back: parts.back_l.count + parts.back_r.count,
    legs: parts.legs_l.count + parts.legs_r.count,
    chest: parts.chest.count,
    abs: parts.abs.count
  };
  let domKey = null, domVal = -1;
  Object.keys(groups).forEach(g => { if (groups[g] > domVal) { domVal = groups[g]; domKey = g; } });
  if (total >= 30 && domVal / total >= 0.5) {
    return dominantEndings[domKey];
  }

  if (total >= 150) {
    return { emoji: '🏆', title: '伝説のパーフェクトボディエンド', desc: 'あらゆる部位を極限まで、しかもバランス良く鍛え抜いた。これぞ真のエンディング。' };
  }
  return { emoji: '🙂', title: 'そこそこマッチョエンド', desc: '無理なく、バランス良くそこそこの筋肉がついた。健康的で何より。' };
}

function showEndingScreen() {
  const ending = getEnding();
  endingEmoji.textContent = ending.emoji;
  endingTitle.textContent = ending.title;
  endingDesc.textContent = ending.desc;

  endingStats.innerHTML = '';
  Object.keys(parts).forEach(key => {
    const item = document.createElement('div');
    item.className = 'ending-stat';
    item.innerHTML = '<div class="k">' + shortLabel[key] + '</div><div class="v">' + parts[key].count + '回</div>';
    endingStats.appendChild(item);
  });

  gameHeader.style.display = 'none';
  gameMain.style.display = 'none';
  endingScreen.style.display = 'block';
}

function backToGame() {
  endingScreen.style.display = 'none';
  gameHeader.style.display = 'flex';
  gameMain.style.display = 'flex';
}

function restartFromEnding() {
  resetGame();
  backToGame();
}

trainBtn.onclick = train;
restBtn.onclick = rest;
resetBtn.onclick = handleResetClick;
doneBtn.onclick = showEndingScreen;
continueBtn.onclick = backToGame;
restartBtn.onclick = restartFromEnding;

renderGrid();
updateSelected();
updateEnergy();
updateTitle();
Object.keys(parts).forEach(updateBodyVisual);
</script>
</body>
</html>
